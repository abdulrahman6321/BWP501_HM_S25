<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الفعالية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-graduation-cap text-white text-xl"></i>
                </div>
                <span class="text-xl font-bold text-gray-800">دليل الفعاليات</span>
            </div>

            <div class="hidden md:flex gap-6">
                <a href="index.html" class="hover:text-blue-600">الرئيسية</a>
                <a href="events.html" class="hover:text-blue-600">الفعاليات</a>
                <a href="about.html" class="hover:text-blue-600">عن الدليل</a>
                <a href="contact.html" class="hover:text-blue-600">اتصل بنا</a>
            </div>
        </div>
    </nav>

    <!-- Header Image -->
    <div id="header-image"
        class="w-full h-72 md:h-96 bg-gray-300 bg-cover bg-center relative flex items-end">
        <div class="absolute inset-0 bg-black bg-opacity-40"></div>
        <h1 id="event-title"
            class="relative text-white text-3xl md:text-5xl font-bold p-6">
        </h1>
    </div>

    <!-- Content -->
    <div class="max-w-5xl mx-auto px-6 py-10">

        <div class="bg-white rounded-2xl shadow-lg p-8">

            <!-- Description -->
            <p id="event-description" class="text-gray-700 text-lg leading-relaxed mb-6"></p>

            <!-- Info Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

                <div class="flex items-center gap-3 bg-gray-50 p-4 rounded-xl shadow">
                    <i class="fas fa-calendar text-blue-600 text-2xl"></i>
                    <div>
                        <p class="text-gray-500 text-sm">تاريخ الفعالية</p>
                        <p id="event-date" class="font-bold text-gray-800"></p>
                    </div>
                </div>

                <div class="flex items-center gap-3 bg-gray-50 p-4 rounded-xl shadow">
                    <i class="fas fa-map-marker-alt text-red-500 text-2xl"></i>
                    <div>
                        <p class="text-gray-500 text-sm">الموقع</p>
                        <p id="event-location" class="font-bold text-gray-800"></p>
                    </div>
                </div>

                <div class="flex items-center gap-3 bg-gray-50 p-4 rounded-xl shadow">
                    <i class="fas fa-tag text-green-600 text-2xl"></i>
                    <div>
                        <p class="text-gray-500 text-sm">التصنيف</p>
                        <p id="event-category" class="font-bold text-gray-800"></p>
                    </div>
                </div>

            </div>

            <!-- Additional Images -->
            <h2 class="text-2xl font-bold mb-4">صور إضافية</h2>
            <div id="extra-images" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10"></div>

            <!-- Buttons -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">

                <!-- Add to Calendar -->
                <button onclick="addToCalendar()"
                    class="bg-green-600 text-white py-3 rounded-xl text-lg font-semibold hover:bg-green-700 transition">
                    <i class="fas fa-calendar-plus ml-2"></i> أضف إلى التقويم
                </button>

                <!-- Share -->
                <button onclick="shareEvent()"
                    class="bg-blue-600 text-white py-3 rounded-xl text-lg font-semibold hover:bg-blue-700 transition">
                    <i class="fas fa-share-alt ml-2"></i> مشاركة الفعالية
                </button>

            </div>

        </div>

        <!-- Related Events -->
        <div class="mt-12">
            <h2 class="text-3xl font-bold mb-6">فعاليات ذات صلة</h2>
            <div id="related-events" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

        <!-- Back Button -->
        <div class="text-center mt-8">
            <a href="events.html"
                class="inline-block bg-gray-800 text-white px-6 py-3 rounded-xl hover:bg-gray-900 transition">
                العودة للفعاليات
            </a>
        </div>

    </div>

    <script>
        const eventsData = [
            {
                id: 1,
                title: "ندوة التراث الثقافي",
                description: "ندوة تستعرض التراث الثقافي العربي وأهميته في بناء هوية الجيل الحديث.",
                category: "ثقافة",
                event_date: "2026-05-03",
                location: "قاعة الاحتفالات",
                image: "https://images.unsplash.com/photo-1529101091764-c3526daf38fe?w=1200",
                extra: [
                    "https://images.unsplash.com/photo-1529101091764-c3526daf38fe?w=400",
                    "https://images.unsplash.com/photo-1504196606672-aef5c9cefc92?w=400",
                    "https://images.unsplash.com/photo-1508609349937-5ec4ae374ebf?w=400"
                ]
            },
            {
                id: 2,
                title: "بطولة كرة القدم الجامعية",
                description: "بطولة رياضية تضم أفضل الفرق الجامعية في منافسة قوية ومثيرة.",
                category: "رياضة",
                event_date: "2026-05-08",
                location: "ملعب الجامعة الرياضي",
                image: "https://images.unsplash.com/photo-1543351613-ac6b2a890c88?w=1200",
                extra: [
                    "https://images.unsplash.com/photo-1543351613-ac6b2a890c88?w=400",
                    "https://images.unsplash.com/photo-1508609349937-5ec4ae374ebf?w=400",
                    "https://images.unsplash.com/photo-1529101091764-c3526daf38fe?w=400"
                ]
            },
            {
                id: 3,
                title: "حفل الموسيقى الكلاسيكية",
                description: "أمسية موسيقية رائعة يقدمها أوركسترا الجامعة بأعمال كلاسيكية عالمية.",
                category: "موسيقى",
                event_date: "2026-05-10",
                location: "المسرح الجامعي",
                image: "https://images.unsplash.com/photo-1574676307624-bbf1b0f683c9?w=1200",
                extra: [
                    "https://images.unsplash.com/photo-1574676307624-bbf1b0f683c9?w=400",
                    "https://images.unsplash.com/photo-1504196606672-aef5c9cefc92?w=400",
                    "https://images.unsplash.com/photo-1529101091764-c3526daf38fe?w=400"
                ]
            }
        ];

        // قراءة ID من الرابط
        const params = new URLSearchParams(window.location.search);
        const eventId = parseInt(params.get("id"));

        const event = eventsData.find(e => e.id === eventId);

        if (!event) {
            document.body.innerHTML = `
                <div class="text-center py-40">
                    <h1 class="text-3xl font-bold text-gray-700 mb-4">الفعالية غير موجودة</h1>
                    <a href="events.html" class="text-blue-600 underline text-lg">العودة للفعاليات</a>
                </div>
            `;
        } else {
            document.getElementById("header-image").style.backgroundImage = `url('${event.image}')`;
            document.getElementById("event-title").textContent = event.title;
            document.getElementById("event-description").textContent = event.description;
            document.getElementById("event-date").textContent = event.event_date;
            document.getElementById("event-location").textContent = event.location;
            document.getElementById("event-category").textContent = event.category;

            // صور إضافية
            const extraContainer = document.getElementById("extra-images");
            event.extra.forEach(img => {
                extraContainer.innerHTML += `
                    <img src="${img}" class="rounded-xl shadow h-40 w-full object-cover">
                `;
            });

            // فعاليات ذات صلة
            const related = eventsData.filter(e => e.category === event.category && e.id !== event.id);
            const relatedContainer = document.getElementById("related-events");

            related.forEach(ev => {
                relatedContainer.innerHTML += `
                    <div class="bg-white rounded-xl shadow overflow-hidden">
                        <img src="${ev.image}" class="h-40 w-full object-cover">
                        <div class="p-4">
                            <h3 class="font-bold text-lg mb-2">${ev.title}</h3>
                            <p class="text-gray-600 text-sm mb-3">${ev.description}</p>
                            <a href="event.html?id=${ev.id}" class="block bg-blue-600 text-white text-center py-2 rounded hover:bg-blue-700 transition">عرض التفاصيل</a>
                        </div>
                    </div>
                `;
            });
        }

        function shareEvent() {
            navigator.clipboard.writeText(window.location.href);
            alert("تم نسخ رابط الفعالية!");
        }

        function addToCalendar() {
            const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${event.title}&dates=20260503T090000Z/20260503T110000Z&details=${event.description}`;
            window.open(url, "_blank");
        }
    </script>

</body>

</html>
